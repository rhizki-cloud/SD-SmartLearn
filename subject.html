      <span class="badge badge-soft" id="gradeBadge"></span>

        <a class="btn btn-outline-primary" href="hadiah.html">🎁 Hadiah</a>
        <a class="btn btn-outline-primary" href="games.html">🎮 Games</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-3">
      <!-- LEFT: daftar mapel -->
      <div class="col-lg-4">
        <div class="panel">
          <h2 class="h4 mb-1" style="font-weight:900;">Pilih Mapel 📚</h2>
          <div class="text-muted mb-3">Klik kartu mapel ya!</div>
          <div id="subjectList" class="mapel-grid"></div>
        </div>
      </div>

      <!-- RIGHT: detail mapel -->
      <div class="col-lg-8">
        <div class="panel">
          <!-- header mapel -->
          <div class="d-flex justify-content-between align-items-start gap-2 flex-wrap">
            <div class="me-auto">
              <h1 class="h4 mb-1" id="subjectTitle" style="font-weight:900;">Pilih mapel dulu ya 🙂</h1>
              <div class="text-muted" id="subjectDesc"></div>
            </div>
            <button class="btn btn-outline-primary big-btn" id="markDoneBtn" disabled>✅ Selesai</button>
          </div>

          <hr class="my-3"/>

          <!-- ✅ TOOLBAR TOMBOL (SATU) -->
          <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3" id="subjectToolbar">
            <div class="btn-group" role="group" aria-label="Mode">
              <button type="button" class="btn btn-outline-primary mode-btn active" data-mode="materi">📘 Materi</button>
              <button type="button" class="btn btn-outline-primary mode-btn" data-mode="kuis">❓ Kuis</button>
            </div>
          
            <button type="button" class="btn btn-outline-danger big-btn" id="stopAudioBtn">
              ⏹ Stop Audio
            </button>
          </div>

          <!-- panels -->
          <section id="panelMateri" class="section-soft">
            <h3 class="h5 mb-2" style="font-weight:900;">Ringkasan Materi 📘</h3>
            <div class="materi-reader">
              <div class="bab-nav d-flex justify-content-between align-items-center gap-2 mb-3">
                <button class="btn btn-outline-primary btn-sm" id="prevBabBtn" type="button">
                  ⬅️ Bab Sebelumnya
                </button>
            
                <span class="kid-chip" id="babCounter">Bab 1/1</span>
            
                <button class="btn btn-outline-primary btn-sm" id="nextBabBtn" type="button">
                  Bab Selanjutnya ➡️
                </button>
              </div>
            
              <div id="materialBox" class="materi-box"></div>
            </div>
          </section>

          <section id="panelKuis" class="section-soft quiz-section" style="display:none;">
            <div class="quiz-hero">
              <div>
                <div class="quiz-chip">🎯 Tantangan Belajar</div>
                <h3 class="quiz-title">Kuis Cepat ❓</h3>
                <p class="quiz-subtitle">
                  Pilih tingkat soal, lalu mulai kuis. Jawab dengan benar untuk dapat XP dan bintang!
                </p>
              </div>
          
              <div class="quiz-illustration">🧠✨</div>
            </div>
          
            <div id="quizBox"></div>
          </section>
        </div>
      </div>
    </div>
  </main>
