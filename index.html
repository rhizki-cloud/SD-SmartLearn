<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SD SmartLearn</title>
  <link rel="icon" type="image/png" href="aset/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>

<body>
  <div class="split-container">
    <div class="split-content">
      <div class="welcome-card">
        <div class="d-flex align-items-center gap-2 mb-3">
          <img src="aset/logo.png" width="48" height="48" alt="Logo">
          <div>
            <h1 class="h4 m-0 fw-bold">SD SmartLearn</h1>
            <small class="text-muted">Belajar ringkas + kuis + games</small>
          </div>
        </div>

        <p class="text-muted mb-4">Masukkan nama untuk mulai belajar.</p>

        <!-- ✅ Login form (ditangani oleh app.js) -->
        <form id="name-form" autocomplete="off">
          <label class="form-label" for="userName">Nama</label>
          <input
            id="userName"
            name="userName"
            class="form-control form-control-lg"
            placeholder="Contoh: Budi"
            required
            autofocus
          />
          <button class="btn btn-primary btn-lg w-100 mt-3" type="submit">Masuk</button>
        </form>

        <div class="mt-3 small text-muted">
          Tips: Usahakan menggunakan nama yang mudah di ingat dan unik.
        </div>
      </div>
    </div>

    <div class="split-visual">
      <img src="aset/hero.png" alt="Belajar menyenangkan">
    </div>
  </div>

  <!-- ✅ SweetAlert untuk pesan error (dipakai app.js) -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- ✅ app.js yang meng-handle submit + set sd_name + multi-user -->
  <script src="js/app.js"></script>

  <!-- ❌ Tidak ada lagi script login inline di index.html -->
</body>
</html>
